<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navify - Smart Indoor Navigation</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body class="landing-body" style="overflow-y: auto; align-items: flex-start; padding-top: 2rem;">
    <div class="glass-container text-center" style="max-width: 600px;">
        <h1 class="title" id="lbl-title">Navify</h1>
        <p class="subtitle" id="lbl-subtitle">Smart Indoor Navigation. Find your way effortlessly.</p>

        <div class="qr-simulation-box">
            <div class="qr-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
            </div>
            <h2 id="lbl-scan">Scan QR to Enter</h2>
            <p id="lbl-sim-desc">Point your camera at a building entrance QR code.</p>

            <div id="reader"
                style="width: 100%; max-width: 400px; margin: 10px auto; border-radius: 12px; overflow: hidden;"></div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="startScanner()" id="btn-scan">📷 Start Camera Scanner</button>
                <button class="btn btn-secondary" onclick="simulateScan('main_gate')" id="btn-main-qr">Bypass: Simulate
                    Main Gate</button>
            </div>
        </div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--glass-border);">

        <div class="qr-generation">
            <h3>Test QR Codes</h3>
            <p style="font-size: 0.9rem; color: #666; margin-bottom: 10px;">Scan these with your phone or the camera
                scanner above to test.</p>
            <div style="display: flex; justify-content: space-around; flex-wrap: wrap;">
                <div>
                    <div id="qr-main" style="background: white; padding: 10px;"></div>
                    <p style="font-size: 0.8rem; margin-top: 5px;">Main Gate</p>
                </div>
                <div>
                    <div id="qr-ele" style="background: white; padding: 10px;"></div>
                    <p style="font-size: 0.8rem; margin-top: 5px;">Library</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generate Test QR Codes using current host
        window.onload = () => {
            const baseUrl = window.location.href.replace('index.html', 'navigation.html');
            new QRCode(document.getElementById("qr-main"), { text: `${baseUrl}?start=main_gate`, width: 128, height: 128 });
            new QRCode(document.getElementById("qr-ele"), { text: `${baseUrl}?start=library`, width: 128, height: 128 });
        };

        const html5QrCode = new Html5Qrcode("reader");

        function startScanner() {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop().then(() => {
                        window.location.href = decodedText;
                    });
                },
                (errorMessage) => {
                    // ignore continuous scanning errors
                }
            ).catch((err) => {
                alert("Camera access failed or not supported.");
            });
        }
        function simulateScan(startNodeId) {
            window.location.href = `navigation.html?start=${startNodeId}`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((reg) => {
                    console.log('ServiceWorker registration successful');
                }).catch((err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
