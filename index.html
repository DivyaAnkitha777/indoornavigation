<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navify - Smart Indoor Navigation</title>

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 2rem;
            color: white;
        }

        .glass-container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 600;
        }

        .subtitle {
            opacity: 0.8;
        }

        .btn {
            margin: 10px;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-primary {
            background: #00f2fe;
            color: black;
        }

        .btn-secondary {
            background: white;
            color: black;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        #reader {
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            border-radius: 12px;
            overflow: hidden;
        }

        #loadingText {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <h1 class="title">🧭 Navify</h1>
        <p class="subtitle">Smart Indoor Navigation. Find your way effortlessly.</p>

        <h2>Scan QR to Enter</h2>
        <p>Point your camera at a building entrance QR code.</p>

        <div id="reader"></div>
        <div id="loadingText" style="display: none;">
            <div class="pulse-loader"></div>
            <p style="margin-top: 10px; font-weight: 500; color: white;">📡 Decoding QR...</p>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <button class="btn btn-primary" onclick="startScanner()">📷 Start Camera</button>
                <button class="btn btn-primary" onclick="document.getElementById('qr-upload').click()">📂 Upload from
                    Gallery</button>
                <input type="file" id="qr-upload" accept="image/*" style="display: none;"
                    onchange="handleFileUpload(event)">
            </div>
            <button class="btn btn-secondary" onclick="simulateScan('main_gate')">Simulate Main Gate</button>
        </div>

        <hr style="margin: 2rem 0; border: 1px solid rgba(255,255,255,0.2);">

        <h3>Test QR Codes</h3>

        <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap: 20px;">
            <div style="text-align: center;">
                <div id="qr-main" style="background:white; padding:10px; border-radius: 8px;"></div>
                <p>Main Gate</p>
            </div>

            <div style="text-align: center;">
                <div id="qr-block-c" style="background:white; padding:10px; border-radius: 8px;"></div>
                <p>Block C</p>
            </div>

            <div style="text-align: center;">
                <div id="qr-lib" style="background:white; padding:10px; border-radius: 8px;"></div>
                <p>Library (G)</p>
            </div>

            <div style="text-align: center;">
                <div id="qr-canteen" style="background:white; padding:10px; border-radius: 8px;"></div>
                <p>Canteen</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            let fullUrl = window.location.href.split('?')[0].split('#')[0];
            if (fullUrl.endsWith('/')) {
                fullUrl += 'index.html';
            } else if (!fullUrl.endsWith('.html')) {
                fullUrl += '/index.html';
            }

            const baseUrl = fullUrl.replace('index.html', 'navigation.html');

            new QRCode(document.getElementById("qr-main"), {
                text: `${baseUrl}?start=main_gate`,
                width: 128,
                height: 128
            });

            new QRCode(document.getElementById("qr-block-c"), {
                text: `${baseUrl}?start=block_c`,
                width: 128,
                height: 128
            });

            new QRCode(document.getElementById("qr-lib"), {
                text: `${baseUrl}?start=lib_entrance_g`,
                width: 128,
                height: 128
            });

            new QRCode(document.getElementById("qr-canteen"), {
                text: `${baseUrl}?start=canteen`,
                width: 128,
                height: 128
            });
        };

        const html5QrCode = new Html5Qrcode("reader");

        function startScanner() {
            document.getElementById("loadingText").style.display = "block";

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    html5QrCode.stop().then(() => {
                        processScannedText(decodedText);
                    });
                },
                (errorMessage) => {
                    // Ignore background scan errors
                }
            ).catch(err => {
                document.getElementById("loadingText").style.display = "none";
                alert("Camera Error: " + err);
            });
        }

        function processScannedText(decodedText) {
            document.getElementById("loadingText").style.display = "none";
            alert("✅ QR Detected! Redirecting...");
            let redirectUrl = decodedText;
            const navIndex = redirectUrl.indexOf("navigation.html");
            if (navIndex !== -1) {
                redirectUrl = redirectUrl.substring(navIndex);
            }
            window.location.href = redirectUrl;
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Reset the input so the same file could be selected again.
            event.target.value = '';

            document.getElementById("loadingText").style.display = "block";

            try {
                // TRY 1: Native BarcodeDetector API (Amazing for Android Chrome on WhatsApp/Skewed photos)
                if ('BarcodeDetector' in window) {
                    const barcodeDetector = new window.BarcodeDetector({ formats: ['qr_code'] });
                    const imgBitmap = await createImageBitmap(file);
                    const barcodes = await barcodeDetector.detect(imgBitmap);
                    if (barcodes.length > 0) {
                        return processScannedText(barcodes[0].rawValue);
                    }
                }
            } catch (e) {
                console.warn("BarcodeDetector failed, falling back to html5QrCode", e);
            }

            // TRY 2: HTML5QRCode Library Component Fallback
            html5QrCode.scanFile(file, false)
                .then(decodedText => {
                    processScannedText(decodedText);
                })
                .catch(err => {
                    document.getElementById("loadingText").style.display = "none";
                    alert("❌ Could not read QR. This happens if the image is too blurry, skewed, or compressed (like via WhatsApp). Please try using the live camera or a clearer photo.");
                });
        }

        function simulateScan(startNodeId) {
            alert("Simulating QR...");
            window.location.href = `navigation.html?start=${startNodeId}`;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
